<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchParty Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected { background: #22c55e; }
    #status-text { font-size: 13px; color: #94a3b8; }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 9px 12px;
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    input::placeholder { color: #475569; }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }
    #connect-btn {
      background: #7c3aed;
      color: #fff;
    }
    #connect-btn:hover { opacity: 0.85; }
    #connect-btn.disconnect {
      background: #dc2626;
    }
    #room-info {
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
      min-height: 16px;
    }
    #room-info span { color: #a78bfa; font-weight: 600; }
  </style>
</head>
<body>
  <h1>WatchParty Sync</h1>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>

  <div class="field">
    <label>Backend URL</label>
    <input id="backend-url" type="text" placeholder="http://localhost:3001" />
  </div>

  <div class="field">
    <label>Room ID</label>
    <input id="room-id" type="text" placeholder="my-room-123" />
  </div>

  <div class="field">
    <label>User ID</label>
    <input id="user-id" type="text" placeholder="auto-generated" readonly />
  </div>

  <button id="connect-btn">Connect</button>

  <div id="room-info"></div>

  <script src="popup.js"></script>
</body>
</html>
